function demClass(d){return (d==='высокий'||d==='растёт')?'dem':'demmid';}
function riskClass(r){return r==='низкий'?'low':r==='средний'?'mid':'high';}
function matchProfs(code){
  const w={};code.split('').forEach((c,i)=>w[c]=3-i);
  const scored=PROFS.map(p=>{let s=0;p.t.split('').forEach(l=>{if(w[l])s+=w[l];});if(p.d==='высокий')s+=0.6;if(p.d==='растёт')s+=0.4;return Object.assign({s},p);}).filter(p=>p.s>0).sort((a,b)=>b.s-a.s);
  const office=scored.filter(p=>!p.earth), earth=scored.filter(p=>p.earth);
  return {spot:office.slice(0,3),list:office.slice(0,14),earth:earth.slice(0,6)};
}

var _radN=0;
function radar6(items){
 var cx=210,cy=195,R=118,N=items.length,gid='radg'+(++_radN);
 var ang0=-Math.PI/2,step=2*Math.PI/N;
 function pt(a,r){return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
 var rings='';[0.25,0.5,0.75,1].forEach(function(f){var pts=[];for(var i=0;i<N;i++){var p=pt(ang0+i*step,R*f);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}rings+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#e6e8f5" stroke-width="1"/>';});
 var axes='',labels='',dpts=[],dots='';
 for(var i=0;i<N;i++){var a=ang0+i*step,edge=pt(a,R);
  axes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+edge[0].toFixed(1)+'" y2="'+edge[1].toFixed(1)+'" stroke="#e6e8f5" stroke-width="1"/>';
  var val=Math.max(0,Math.min(100,Math.round(items[i].val||0)));
  var dp=pt(a,R*Math.max(6,val)/100);dpts.push(dp[0].toFixed(1)+','+dp[1].toFixed(1));
  dots+='<circle cx="'+dp[0].toFixed(1)+'" cy="'+dp[1].toFixed(1)+'" r="3.6" fill="#5b6cff"/>';
  var lp=pt(a,R+24),ax=lp[0]<cx-6?'end':(lp[0]>cx+6?'start':'middle');
  labels+='<text x="'+lp[0].toFixed(1)+'" y="'+lp[1].toFixed(1)+'" text-anchor="'+ax+'" font-size="13.5" font-weight="700" fill="#20233a">'+items[i].label+'</text>';
  labels+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+16).toFixed(1)+'" text-anchor="'+ax+'" font-size="12.5" font-weight="700" fill="#7a5cff">'+val+'%</text>';
 }
 var poly='<polygon points="'+dpts.join(' ')+'" fill="url(#'+gid+')" stroke="#5b6cff" stroke-width="2.4" stroke-linejoin="round"/>';
 return '<svg viewBox="0 0 420 410" width="100%" style="max-width:480px;display:block;margin:6px auto 2px" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="'+gid+'" cx="50%" cy="50%" r="62%"><stop offset="0%" stop-color="#8a5bff" stop-opacity="0.32"/><stop offset="100%" stop-color="#5b6cff" stop-opacity="0.12"/></radialGradient></defs><circle cx="210" cy="195" r="118" fill="#fbfbff"/>'+rings+axes+poly+dots+labels+'</svg>';
}

function archetype12(p){
  const b=p.big5,r=p.riasec.pct,d=p.drivers||[],st=p.strengths||[],vl=p.values||[];
  const inA=(arr,x)=>arr.indexOf(x)>=0?1:0;
  const S={
   'Искатель': b.openness*0.6 + inA(d,'Свобода')*25 + r.I*0.2 + r.A*0.1,
   'Творец': r.A*0.6 + inA(d,'Творчество')*25 + inA(st,'Креативность')*15 + b.openness*0.2,
   'Мудрец': r.I*0.6 + inA(st,'Любознательность')*15 + inA(st,'Любовь к учению')*12 + b.openness*0.15,
   'Маг': b.openness*0.4 + r.I*0.25 + r.E*0.2 + inA(d,'Развитие')*15 + inA(d,'Влияние')*10,
   'Правитель': r.C*0.5 + r.E*0.3 + b.conscientiousness*0.3 + inA(d,'Влияние')*20 + inA(st,'Лидерство')*12,
   'Герой': b.conscientiousness*0.4 + r.E*0.3 + inA(st,'Смелость')*15 + inA(st,'Настойчивость')*12 + inA(d,'Признание')*12,
   'Заботливый': r.S*0.6 + b.agreeableness*0.4 + inA(st,'Доброта')*15 + inA(d,'Польза')*18,
   'Любовник': b.agreeableness*0.35 + inA(st,'Чувство прекрасного')*18 + r.A*0.25 + inA(vl,'Дружба')*12,
   'Свой парень': b.agreeableness*0.35 + b.stability*0.25 + inA(st,'Надёжность')*18 + inA(vl,'Стабильность')*15 + inA(vl,'Семья')*12,
   'Бунтарь': b.openness*0.4 + inA(d,'Свобода')*20 + (100-b.agreeableness)*0.25 + inA(vl,'Независимость')*15,
   'Шут': b.extraversion*0.5 + inA(st,'Юмор')*25 + inA(st,'Оптимизм')*12,
   'Простодушный': b.agreeableness*0.4 + b.stability*0.35 + inA(st,'Оптимизм')*15 + inA(st,'Благодарность')*10
  };
  const sorted=Object.entries(S).sort((x,y)=>y[1]-x[1]);
  return {top:sorted[0][0],second:sorted[1][0]};
}

const TNR={R:'Практик',I:'Исследователь',A:'Творец',S:'Помощник',E:'Лидер',C:'Организатор'};
function evalFit(q,p){
  const s=q.toLowerCase().trim();
  const letters=[];for(const L in KW){if(KW[L].some(k=>s.includes(k)))letters.push(L);}
  for(const L in HKW){if(HKW[L].some(k=>s.includes(k))&&!letters.includes(L))letters.push(L);}
  if(!letters.length){const hit=PROFS.find(pr=>{const n=pr.n.toLowerCase();return n.includes(s)||s.includes(n.split(' ')[0]);});if(hit)hit.t.split('').forEach(l=>{if(!letters.includes(l))letters.push(l);});}
  const code=p.riasec.code,w={};code.split('').forEach((c,i)=>w[c]=3-i);
  let score=0;const matched=[],missed=[];
  letters.forEach(l=>{if(w[l]){score+=w[l];matched.push(l);}else missed.push(l);});
  if(!letters.length)return {verdict:'Сложно оценить',vc:'mid',reasons:['Уточните формулировку — по этому запросу трудно определить тип деятельности.']};
  let verdict,vc;
  if(score>=3){verdict='Подойдёт';vc='yes';}else if(score>=1){verdict='Скорее подойдёт';vc='mid';}else{verdict='Скорее не ваше';vc='no';}
  const reasons=[];
  if(matched.length)reasons.push('Совпадает с вашими ведущими сторонами: '+matched.map(l=>TNR[l]).join(', ')+' — здесь вы сильны.');
  if(missed.length)reasons.push('Эта сфера во многом опирается на тип «'+missed.map(l=>TNR[l]).join(', ')+'», выраженный у вас слабее — это стоит учесть.');
  if(vc==='yes')reasons.push('Ваш код '+code+' хорошо ложится на это направление — здесь ваш потенциал и рост.');
  if(vc==='no')reasons.push('Скорее всего, будет забирать энергию: ключевые задачи лежат вне вашего склада.');
  var isTeam=TEAM.some(function(k){return s.includes(k);}),isSolo=SOLO.some(function(k){return s.includes(k);});
  if(isTeam||isSolo){var ex=p.big5.extraversion;reasons.length=0;if(isTeam){if(ex>=55){verdict='Отлично подойдёт';vc='yes';reasons.push('Командный формат — прямо ваше: вы заряжаетесь от людей и общего азарта.');}else{verdict='Скорее подойдёт';vc='mid';reasons.push('Командный вид возможен, но по темпераменту вам ближе индивидуальные форматы, где свой ритм.');}}else{if(ex<=55){verdict='Отлично подойдёт';vc='yes';reasons.push('Индивидуальный формат — прямо ваше: сосредоточенность и свой темп.');}else{verdict='Подойдёт';vc='yes';reasons.push('Индивидуальный вид вам подойдёт; и оставляйте место командному — люди дают вам энергию.');}}}
  return {verdict,vc,reasons};
}
function wireSearch(p){
  const btn=document.getElementById('sbtn'),inp=document.getElementById('sq'),res=document.getElementById('sres');
  if(!btn)return;
  const run=()=>{const q=(inp.value||'').trim();if(!q)return;const r=evalFit(q,p);res.innerHTML='<span class="verdict '+r.vc+'">'+r.verdict+'</span>'+r.reasons.map(x=>'<p style="font-size:14.5px;margin:8px 0 0">'+x+'</p>').join('');res.classList.add('on');};
  btn.addEventListener('click',run);inp.addEventListener('keydown',e=>{if(e.key==='Enter')run();});
}

  h+='<div class="tl"><div class="when">11 класс</div><h4>Готовьтесь и поступайте</h4><p>Системная подготовка к ЕГЭ, портфолио проектов и достижений, документы сразу в несколько ВУЗов для подстраховки.</p></div>';
  // Сценарии (подростковые)
  h+='<div class="sec-num">Сценарии</div><h2>Куда может привести ваш путь</h2>';
  if(ai&&ai.scenarios&&ai.scenarios.length){
    h+=ai.scenarios.map(s=>'<div class="scen"><span class="prob">'+esc(s.prob||'')+'</span><h4>'+esc(s.title||'')+'</h4><p>'+esc(s.text||'')+'</p></div>').join('');
  } else {
    h+='<div class="scen"><span class="prob">наиболее вероятно</span><h4>'+goal+' и близкие направления</h4><p>Твой склад ведёт сюда — это растущие и интересные тебе сферы.</p></div>';
    h+='<div class="scen"><span class="prob">по душе</span><h4>Творчество и создание своего</h4><p>Если возьмёт верх творческая сторона — дизайн, продукт, авторские проекты.</p></div>';
    h+='<div class="scen"><span class="prob">для самых любопытных</span><h4>Наука и исследования</h4><p>Если захочется глубины — путь учёного или инженера-изобретателя даст простор уму.</p></div>';
    h+='<div class="scen"><span class="prob">рычаг для любого пути</span><h4>Дружба с ИИ</h4><p>Освой ИИ-инструменты уже сейчас — это ускорит учёбу и любой будущий выбор.</p></div>';
  }
  // AI-примечание
  // УМНЫЙ ПОИСК
  h+='<div class="sec-num">Итог</div><h2>Резюме по вашему разбору</h2>';
  h+='<div class="card"><p style="margin-top:0">'+((ai&&ai.summary)?ai.summary.split(/\n\n+|\n/).filter(Boolean).map(function(x){return esc(x);}).join('</p><p>'):('Если коротко: по складу вы — «'+title+'». Ваши самые подходящие направления сейчас — '+(m.spot.length?m.spot.map(function(x){return x.n;}).slice(0,3).join(', '):'из списка выше')+'. Двигайтесь к ролям, где сходятся ваши сильные стороны, тип и интерес — там ваш потенциал раскроется в полную силу.'))+'</p></div>';
  h+='<div class="sec-num">Умный поиск</div><h2>Проверьте профессию, спорт или хобби</h2>';
  h+='<p class="muted" style="margin-top:0">Впишите профессию, направление, спорт или хобби — оценю, подходит ли это вам по складу, и объясню почему.</p>';
  h+='<div class="search"><div class="row"><input id="sq" type="text" placeholder="Например: актриса, дизайнер, психология, футбол…" /><button class="sbtn" id="sbtn">Проверить</button></div><div class="sres" id="sres"></div></div>';
  h+='<div class="note">Отчёт собран по вашим ответам в диагностике. Оценки — ориентир, не приговор.</div>';
  h+='<div class="nav noprint" style="margin-top:16px;gap:12px;justify-content:center;flex-wrap:wrap"><button class="btn accent" onclick="window.print()">⬇ Скачать отчёт в PDF</button><button class="btn ghost" id="restart2">↺ Пройти заново</button></div>';
  return h;
}

// ===== AI-ПОДКЛЮЧЕНИЕ (см. 5-AI-подключение.html) =====
const AI_ENDPOINT = "";  // пусто → шаблон. Впишите URL вашего backend → включится живой AI.
function aiPayload(p){
  const m=matchProfs(p.riasec.code);
  return {трек:'Старт · 14–19 лет, подросток-школьник',код:p.riasec.code,big5:p.big5,силы:p.strengths,драйверы:p.drivers,ценности:p.values,поток:p.flow,архетип_ведущий:archetype12(p).top,архетип_второй:archetype12(p).second,mbti:mbtiType(p.big5),климов:p.klimov,выгорание:p.burnout,интеллект:p.intelligences,психософия:p.psyche,пол:p.gender,источник:p.source,
    слова:{люблю:p.open.love,поток:p.open.flow,польза:p.open.contribution,хобби:p.open.hobbies,платят_сейчас:p.open.paidFor,забирает_энергию:p.open.drain,мечта_детства:p.open.childhood,интересы:p.open.interests},
    топ_профессии:m.spot.map(x=>x.n)};
}
async function enhanceWithAI(payload){
  if(!AI_ENDPOINT) return null;
  try{
    const ctrl=new AbortController();
    const to=setTimeout(function(){ctrl.abort();},55000);
    const r=await fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:ctrl.signal});
    clearTimeout(to);
    if(!r.ok) return null;
    return await r.json();  // {portrait, strengths_text, scenarios:[{prob,title,text}]}
  }catch(e){ return null; }
}

// ===== ДВИЖОК ТЕСТА =====
const ans={};let i=0;
const host=document.getElementById('qhost'),nextBtn=document.getElementById('next'),backBtn=document.getElementById('back');
function render(){
  const q=Q[i];
  document.getElementById('pbar').style.width=(i/Q.length*100)+'%';
  document.getElementById('block').textContent='Блок: '+q.b;
  document.getElementById('counter').textContent='Вопрос '+(i+1)+' из '+Q.length;
  backBtn.style.visibility=i===0?'hidden':'visible';
  let h='<div class="qcard"><div class="qkind">'+q.k+'</div><div class="qt">'+q.t+'</div>';
  if(q.type==='likert'){h+='<div class="likert">'+L.map(n=>'<button data-v="'+n+'">'+n+'</button>').join('')+'</div><div class="lbl"><span>Совсем не про меня</span><span>Точно про меня</span></div>';}
  else if(q.type==='single'){h+='<div class="opts">'+q.options.map(o=>'<button class="opt" data-v="'+encodeURIComponent(o[1])+'">'+o[0]+'<span class="chk">✓</span></button>').join('')+'</div>';if(q.otherField){h+='<input id="otherinp" type="text" placeholder="Напишите, откуда именно" value="'+((ans[q.id+'_other']||'').replace(/"/g,'&quot;'))+'" style="display:'+(ans[q.id]==='другое'?'block':'none')+';margin-top:12px;width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit">';}}
  else if(q.type==='multi'){h+='<div class="chipwrap">'+q.options.map(o=>'<button class="chipb" data-v="'+encodeURIComponent(o)+'">'+o+'</button>').join('')+'</div><p class="hint">Можно выбрать '+(q.max>=99?'несколько':('до '+q.max))+'.</p>';}
  else if(q.type==='rank'){const cur=ans[q.id]||q.items.slice();ans[q.id]=cur;h+='<div class="rank">'+cur.map((it,idx)=>'<div class="ritem"><span class="num">'+(idx+1)+'</span><span class="nm">'+it+'</span><span class="arr"><button data-d="up">▲</button><button data-d="down">▼</button></span></div>').join('')+'</div><p class="hint">Стрелками ▲▼ поднимайте важное выше.</p>';}
  else if(q.type==='open'){h+='<textarea placeholder="Пара предложений...">'+(ans[q.id]||'')+'</textarea><p class="hint">Необязательно, но помогает сделать отчёт точнее.</p>';}
  h+='</div>';host.innerHTML=h;bind(q);syncNext(q);
}
function bind(q){
  if(q.type==='likert'){host.querySelectorAll('.likert button').forEach(bt=>{if(ans[q.id]==+bt.dataset.v)bt.classList.add('sel');bt.onclick=()=>{host.querySelectorAll('.likert button').forEach(x=>x.classList.remove('sel'));bt.classList.add('sel');ans[q.id]=+bt.dataset.v;syncNext(q);};});}
  else if(q.type==='single'){host.querySelectorAll('.opt').forEach(bt=>{const val=decodeURIComponent(bt.dataset.v);if(ans[q.id]===val)bt.classList.add('sel');bt.onclick=()=>{host.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));bt.classList.add('sel');ans[q.id]=val;if(q.otherField){var oi=host.querySelector('#otherinp');if(oi)oi.style.display=(val==='другое')?'block':'none';}syncNext(q);};});if(q.otherField){var oi2=host.querySelector('#otherinp');if(oi2)oi2.oninput=function(){ans[q.id+'_other']=oi2.value;};}}
  else if(q.type==='multi'){ans[q.id]=ans[q.id]||[];host.querySelectorAll('.chipb').forEach(bt=>{const val=decodeURIComponent(bt.dataset.v);if(ans[q.id].includes(val))bt.classList.add('sel');bt.onclick=()=>{const arr=ans[q.id];const k=arr.indexOf(val);if(k>=0){arr.splice(k,1);bt.classList.remove('sel');}else{if(arr.length>=q.max)return;arr.push(val);bt.classList.add('sel');}syncNext(q);};});}
  else if(q.type==='rank'){host.querySelectorAll('.ritem .arr button').forEach(btn=>{btn.onclick=()=>{const item=btn.closest('.ritem');const list=item.parentNode;const kids=[...list.children];const idx=kids.indexOf(item);if(btn.dataset.d==='up'&&idx>0)list.insertBefore(item,kids[idx-1]);if(btn.dataset.d==='down'&&idx<kids.length-1)list.insertBefore(kids[idx+1],item);ans[q.id]=[...list.children].map(c=>c.querySelector('.nm').textContent);[...list.children].forEach((c,n)=>c.querySelector('.num').textContent=n+1);};});}
  else if(q.type==='open'){const ta=host.querySelector('textarea');ta.oninput=()=>{ans[q.id]=ta.value;};}
}
function answered(q){if(q.type==='open'||q.type==='rank')return true;if(q.type==='multi')return (ans[q.id]||[]).length>0;return ans[q.id]!==undefined;}
function syncNext(q){const ok=answered(q);nextBtn.disabled=!ok&&q.type!=='open';nextBtn.textContent=(ok||q.type==='open')?(i===Q.length-1?'Получить отчёт ✦':'Дальше →'):(q.type==='multi'?'Выберите вариант':'Выберите ответ');if(q.type==='open')nextBtn.disabled=false;}
nextBtn.onclick=()=>{if(nextBtn.disabled)return;if(i<Q.length-1){i++;render();window.scrollTo({top:0,behavior:'smooth'});}else finish();};
backBtn.onclick=()=>{if(i>0){i--;render();window.scrollTo({top:0,behavior:'smooth'});}};
async function finish(){
  let p=null;
  try{ p=computeProfile(ans); }catch(e){ p=null; }
  document.getElementById('test').style.display='none';
  const rep=document.getElementById('report');
  document.getElementById('pbar').style.width='100%';
  document.getElementById('stage').classList.add('docw');
  rep.classList.add('on');
  rep.innerHTML='<div class="cover"><div class="eyebrow">анализируем твои ответы</div><h1>Собираем твой разбор</h1><div class="loadbar"><div class="loadbar-fill" id="lbf"></div></div><p class="loadmsg" id="lbm">Читаем твои ответы…</p><p class="muted" style="text-align:center;font-size:13px;margin-top:8px">Обычно занимает 10–20 секунд. Оставайся на этой странице.</p></div>';
  window.scrollTo({top:0,behavior:'smooth'});
  var _lp=0,_lmi=0,_lmsgs=['Читаем твои ответы…','Считаем 12 систем личности…','Определяем сильные стороны…','Подбираем профессии под тебя…','Рисуем твою карточку личности…','Почти готово…'];
  var _ltimer=setInterval(function(){var f=document.getElementById('lbf'),m=document.getElementById('lbm');_lp+=Math.max(0.3,(96-_lp)*0.02);if(_lp>95)_lp=95;if(f)f.style.width=_lp.toFixed(1)+'%';var ix=Math.min(_lmsgs.length-1,Math.floor(_lp/16));if(ix!==_lmi){_lmi=ix;if(m)m.textContent=_lmsgs[ix];}},400);
  let ai=null;
  try{ if(AI_ENDPOINT && p){ ai=await enhanceWithAI(aiPayload(p)); } }catch(e){ ai=null; }
  clearInterval(_ltimer);
  try{
    rep.innerHTML=buildReport(p,ans,ai);
    wireSearch(p);
  }catch(e){
    try{ rep.innerHTML=buildReport(p,ans,null); wireSearch(p); }
    catch(e2){ rep.innerHTML='<div class="cover"><h1>Секунду…</h1><p class="muted" style="text-align:center">Отчёт почти собран. Нажми кнопку ниже — он появится.</p><button class="btn accent" style="display:block;margin:18px auto" onclick="finish()">Показать отчёт</button></div>'; }
  }
  const rb=document.getElementById('restart2');if(rb)rb.onclick=()=>location.reload();
}
render();
